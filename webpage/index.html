<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0f;
      color: #e8e6f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    header h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .scene-picker {
      display: flex;
      gap: 1px;
      padding: 2rem 2.5rem;
      background: rgba(255,255,255,0.03);
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
    }

    .scene-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      text-transform: uppercase;
    }

    .scene-btn:hover {
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.06);
    }

    .scene-btn.active {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .viewport {
      flex: 1;
      position: relative;
    }

    .viewport iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      position: absolute;
      inset: 0;
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: rgba(255,255,255,0.15);
    }

    .placeholder p {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .placeholder svg {
      opacity: 0.2;
    }

    .fullscreen-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      border: none;
      color: rgba(255,255,255,0.7);
      width: 36px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .fullscreen-btn:hover {
      background: rgba(0,0,0,0.75);
      color: #fff;
    }
  </style>
</head>
<body>

  <header>
    <h1>Ghost Protocol</h1>
  </header>

  <nav class="scene-picker" id="scene-picker">
    <!-- Buttons injected by JS -->
  </nav>

  <div class="viewport" id="viewport">
    <button class="fullscreen-btn" id="fullscreen-btn" title="Fullscreen" style="display: none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
    <div class="placeholder" id="placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <p>Select a scene</p>
    </div>
  </div>

  <script>
    const scenes = [
      { id: "kitchen",     label: "Kitchen" },
      { id: "underwater",      label: "Underwater" },
      { id: "space", label: "Space" },
    ];

    let activeId = null;
    let activeIframe = null;

    const picker = document.getElementById("scene-picker");
    const viewport = document.getElementById("viewport");
    const placeholder = document.getElementById("placeholder");
    const fullscreenBtn = document.getElementById("fullscreen-btn");

    fullscreenBtn.addEventListener("click", () => {
      if (viewport.requestFullscreen) {
        viewport.requestFullscreen();
      } else if (viewport.webkitRequestFullscreen) {
        viewport.webkitRequestFullscreen();
      }
    });

    scenes.forEach(scene => {
      const btn = document.createElement("button");
      btn.className = "scene-btn";
      btn.textContent = scene.label;
      btn.dataset.id = scene.id;
      btn.addEventListener("click", () => loadScene(scene.id));
      picker.appendChild(btn);
    });

    function loadScene(id) {
      if (id === activeId) return;
      activeId = id;

      document.querySelectorAll(".scene-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.id === id);
      });

      if (activeIframe) activeIframe.remove();

      placeholder.style.display = "none";
      fullscreenBtn.style.display = "flex";

      const iframe = document.createElement("iframe");
      iframe.src = `scenes/${id}/index.html`;
      iframe.allow = "fullscreen";
      viewport.appendChild(iframe);
      activeIframe = iframe;
    }
  </script>

</body>
</html>
